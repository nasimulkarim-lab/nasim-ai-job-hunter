name: Daily Job Search

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python main.py

      - name: Commit Report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reports/jobs_report.md

          git diff --staged --quiet || git commit -m "Update daily job report"

          git push
